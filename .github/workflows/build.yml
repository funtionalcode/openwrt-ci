# UFI103_CT OpenWrt 云编译
# 触发方式：PR 合并到 main 后自动触发，或手动触发
#
# 构建流程：
# 1. 从官方 OpenWrt 克隆源码
# 2. 从 hkfuertes/msm8916-openwrt 注入 MSM8916 设备支持
# 3. 添加第三方 Feeds（Nikki、Argon、FRP 等）
# 4. 应用自定义 .config 编译固件

name: Build OpenWrt for UFI103_CT

on:
  # PR 合并到 main 后触发
  push:
    branches:
      - main
    paths:
      - 'config/**'

  # 手动触发
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 版本标签（留空自动获取最新 25.12.x）'
        required: false
        default: ''
      device:
        description: '目标设备'
        required: false
        type: choice
        default: uz801
        options:
          - uz801
          - uf02
      build_debug:
        description: '调试模式（详细日志）'
        required: false
        type: boolean
        default: false

env:
  TZ: Asia/Shanghai
  MSM_REPO: https://github.com/hkfuertes/msm8916-openwrt
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # 解析 OpenWrt 版本
  # ==========================================
  resolve-version:
    name: 解析 OpenWrt 版本
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: 获取最新 25.12.x 版本
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.openwrt_version }}" ]; then
            VERSION="${{ github.event.inputs.openwrt_version }}"
          else
            VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' \
              | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: 无法解析 OpenWrt 版本"
            exit 1
          fi
          echo "OpenWrt 版本: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # 编译固件
  # ==========================================
  build:
    name: 编译固件 (${{ github.event.inputs.device || 'uz801' }})
    needs: resolve-version
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # ========================================
      # 1. 环境准备
      # ========================================
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-aarch64-linux-gnu \
            gettext git libncurses5-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev python3-cryptography \
            rsync swig unzip zlib1g-dev quilt \
            patch curl wget xsltproc nano time python3 python3-pip \
            python3-pyelftools libelf-dev libfdt-dev \
            android-sdk-libsparse-utils mkbootimg gcc-arm-none-eabi \
            device-tree-compiler help2man asciidoc intltool bc \
            perl perl-modules e2fsprogs xz-utils zstd zip
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      # ========================================
      # 2. 获取 OpenWrt 官方源码
      # ========================================
      - name: 克隆 OpenWrt 源码
        run: |
          echo "使用 OpenWrt ${{ needs.resolve-version.outputs.openwrt_version }}"
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout ${{ needs.resolve-version.outputs.openwrt_version }}
          echo "OPENWRT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ========================================
      # 3. 注入 MSM8916 设备支持
      # ========================================
      - name: 注入 MSM8916 设备支持
        run: |
          # 克隆 MSM8916 补丁仓库
          git clone --depth 1 $MSM_REPO msm8916-patches

          # 应用补丁脚本
          cd msm8916-patches
          chmod +x apply_patches.sh
          ./apply_patches.sh ../openwrt

          # 移动设备树和包文件到 OpenWrt 源码
          cd ..
          if [ -d msm8916-patches/msm89xx ]; then
            mv msm8916-patches/msm89xx openwrt/target/linux/msm89xx
          fi
          if [ -d msm8916-patches/packages ]; then
            mv msm8916-patches/packages openwrt/package/msm8916
          fi

          echo "========== MSM8916 补丁已注入 =========="

      # ========================================
      # 4. 添加第三方包
      # ========================================
      - name: 添加第三方 Feeds 和包
        run: |
          cd openwrt

          # Nikki - Mihomo(Clash Meta) 代理客户端（作为 Feed 添加）
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default

          # Argon 主题 - 独立包，直接克隆到 package 目录
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon

          # FRP 客户端 + frpc 二进制 - 独立包，直接克隆到 package 目录
          git clone --depth 1 https://github.com/kuoruan/luci-app-frpc.git package/luci-app-frpc
          git clone --depth 1 https://github.com/kuoruan/openwrt-frp.git package/openwrt-frp

          echo "========== Feeds 配置 =========="
          cat feeds.conf.default
          echo "========== 额外包 =========="
          ls -d package/luci-theme-argon package/luci-app-frpc package/openwrt-frp

      - name: 更新并安装 Feeds
        run: |
          cd openwrt
          rm -rf tmp
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 移除依赖缺失和循环依赖的包，消除 Makefile 警告
          for pkg in luci-app-mjpg-streamer onionshare-cli; do
            [ -d "package/feeds/packages/$pkg" ] && rm -rf "package/feeds/packages/$pkg"
            [ -d "package/feeds/luci/$pkg" ] && rm -rf "package/feeds/luci/$pkg"
          done

          # frps 与 luci-app-frps 存在循环依赖，我们只需要 frpc
          rm -rf package/feeds/luci/luci-app-frps 2>/dev/null || true
          rm -rf package/openwrt-frp/frps 2>/dev/null || true

          # mihomo-alpha 与 mihomo-meta 互相依赖，我们只需要 mihomo-meta
          rm -rf package/feeds/nikki/mihomo-alpha 2>/dev/null || true

      # ========================================
      # 5. 配置
      # ========================================
      - name: 生成 .config
        run: |
          cd openwrt

          # 复制 seed 配置
          cp $GITHUB_WORKSPACE/config/ufi103.seed .config

          # 展开为完整配置
          make defconfig

          # 检查 seed 中的包是否被 defconfig 降级（说明依赖缺失）
          MISSING=""
          while IFS= read -r line; do
            pkg=$(echo "$line" | sed 's/CONFIG_PACKAGE_\(.*\)=y/\1/')
            if grep -q "^# CONFIG_PACKAGE_${pkg} is not set" .config 2>/dev/null; then
              MISSING="$MISSING $pkg"
            fi
          done < <(grep '^CONFIG_PACKAGE.*=y' "$GITHUB_WORKSPACE/config/ufi103.seed")
          if [ -n "$MISSING" ]; then
            echo "⚠️ 以下 seed 包被 defconfig 降级（可能缺少依赖）："
            echo "$MISSING"
          else
            echo "✅ 所有 seed 包均正常选中"
          fi

          # 显示最终配置摘要
          echo "========== 配置摘要 =========="
          grep "^CONFIG_PACKAGE" .config | grep "=y" | head -60
          echo "========== 总包数 =========="
          grep "^CONFIG_PACKAGE" .config | grep "=y" | wc -l

      # ========================================
      # 6. 恢复 ccache 缓存
      # ========================================
      - name: 恢复 ccache 缓存
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-${{ needs.resolve-version.outputs.openwrt_version }}
          restore-keys: |
            openwrt-ccache-

      # ========================================
      # 7. 下载源码包
      # ========================================
      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \; || true

      # ========================================
      # 8. 编译
      # ========================================
      - name: 编译固件
        run: |
          cd openwrt
          if [ "${{ github.event.inputs.build_debug }}" = "true" ]; then
            make -j$(nproc) V=s
          else
            make -j$(nproc) || make -j1 || make -j1 V=s
          fi

      - name: 保存 ccache 缓存
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-${{ needs.resolve-version.outputs.openwrt_version }}-${{ github.run_id }}

      - name: 编译失败时上传日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/logs/
            openwrt/tmp/
          if-no-files-found: ignore

      # ========================================
      # 9. 整理产物（参考 OpenWrt_UFI103S.zip 格式）
      # ========================================
      - name: 整理固件文件
        if: success()
        run: |
          DEVICE="${{ github.event.inputs.device || 'uz801' }}"
          VERSION="${{ needs.resolve-version.outputs.openwrt_version }}"
          PKG_NAME="OpenWrt_UFI103_CT_${VERSION}"
          PKG_DIR="$GITHUB_WORKSPACE/$PKG_NAME"
          mkdir -p "$PKG_DIR"

          # 从编译产物中提取文件
          BIN_DIR=$(ls -d openwrt/bin/targets/*/*/)

          echo "========== 编译产物目录 =========="
          ls -lh "$BIN_DIR"

          # 复制固件核心文件
          cp "$BIN_DIR"/*-squashfs-gpt_both0.bin "$PKG_DIR/gpt_both0.bin" 2>/dev/null || true
          cp "$BIN_DIR"/*-squashfs-boot.img "$PKG_DIR/boot.img" 2>/dev/null || true
          cp "$BIN_DIR"/*-squashfs-system.img "$PKG_DIR/rootfs.img" 2>/dev/null || true

          # 复制刷机脚本
          cp "$BIN_DIR"/*-flash.sh "$PKG_DIR/flash.sh" 2>/dev/null || true

          # 复制 GPT 和引导文件（如有）
          cp "$BIN_DIR"/*-squashfs-gpt_main0.bin "$PKG_DIR/gpt_main0.bin" 2>/dev/null || true
          cp "$BIN_DIR"/*-squashfs-gpt_backup0.bin "$PKG_DIR/gpt_backup0.bin" 2>/dev/null || true
          cp "$BIN_DIR"/*-squashfs-lk2nd.img "$PKG_DIR/lk2nd.img" 2>/dev/null || true

          # 复制 manifest
          cp "$BIN_DIR"/*.manifest "$PKG_DIR/" 2>/dev/null || true

          # 生成 Windows 刷机脚本（使用 CRLF 换行符）
          cat > "$PKG_DIR/flash.bat" << 'BAT_EOF'
          @echo off
          echo OpenWrt UFI103_CT Flash Tool
          echo Please make sure the device is in fastboot mode
          pause
          fastboot flash partition gpt_both0.bin
          fastboot flash hyp hyp.mbn
          fastboot flash rpm rpm.mbn
          fastboot flash sbl1 sbl1.mbn
          fastboot flash tz tz.mbn
          fastboot flash fsc fsc.bin
          fastboot flash fsg fsg.bin
          fastboot flash modemst1 modemst1.bin
          fastboot flash modemst2 modemst2.bin
          fastboot flash aboot aboot.bin
          fastboot flash cdt sbc_1.0_8016.bin
          fastboot erase boot
          fastboot erase rootfs
          fastboot reboot
          echo Please wait for device to re-enter fastboot...
          pause
          fastboot flash boot boot.img
          fastboot -S 200m flash rootfs rootfs.img
          fastboot reboot
          echo Flash completed!
          pause
          BAT_EOF
          sed -i 's/$/\r/' "$PKG_DIR/flash.bat"

          # 生成 Linux/Mac 刷机脚本
          cat > "$PKG_DIR/flash.sh" << 'SH_EOF'
          #!/bin/sh
          echo "OpenWrt UFI103_CT Flash Tool"
          echo "请确保设备已进入 fastboot 模式"
          fastboot flash partition gpt_both0.bin
          fastboot flash hyp hyp.mbn
          fastboot flash rpm rpm.mbn
          fastboot flash sbl1 sbl1.mbn
          fastboot flash tz tz.mbn
          fastboot flash fsc fsc.bin
          fastboot flash fsg fsg.bin
          fastboot flash modemst1 modemst1.bin
          fastboot flash modemst2 modemst2.bin
          fastboot flash aboot aboot.bin
          fastboot flash cdt sbc_1.0_8016.bin
          fastboot erase boot
          fastboot erase rootfs
          fastboot reboot
          sleep 5
          fastboot flash boot boot.img
          fastboot -S 200m flash rootfs rootfs.img
          fastboot reboot
          echo "刷机完成!"
          SH_EOF
          chmod +x "$PKG_DIR/flash.sh"

          # 生成构建信息
          cat > "$PKG_DIR/build_info.txt" << INFO_EOF
          设备: UFI103_CT
          构建时间: $(date '+%Y-%m-%d %H:%M:%S')
          OpenWrt 版本: $VERSION
          OpenWrt 源码: ${{ env.OPENWRT_COMMIT }}
          MSM8916 补丁: $MSM_REPO
          目标 Profile: $DEVICE
          配置文件: ufi103.seed
          INFO_EOF

          echo "========== 最终固件包内容 =========="
          ls -lh "$PKG_DIR/"

      # ========================================
      # 10. 上传产物
      # ========================================
      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_UFI103_CT_${{ needs.resolve-version.outputs.openwrt_version }}
          path: OpenWrt_UFI103_CT_${{ needs.resolve-version.outputs.openwrt_version }}/
          retention-days: 7

      - name: 构建摘要
        if: success()
        run: |
          echo "========== 构建完成 =========="
          echo "OpenWrt: ${{ needs.resolve-version.outputs.openwrt_version }}"
          echo "固件已上传到 Artifacts"
          echo "请到 Actions 页面下载"
