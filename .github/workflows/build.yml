# OpenWrt 多设备云编译
# 触发方式：PR 合并到 main 后自动触发，或手动触发
#
# 构建流程：
# 1. 从官方 OpenWrt 克隆源码
# 2. 从 hkfuertes/msm8916-openwrt 注入 MSM8916 设备支持
# 3. 添加第三方 Feeds（Nikki、Argon、FRP 等）
# 4. 根据 devices/<device>/seed 应用配置编译固件

name: Build OpenWrt

on:
  # PR 合并到 main 后触发
  push:
    branches:
      - main
    paths:
      - 'devices/**'

  # 手动触发
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 版本标签（留空自动获取最新 25.12.x）'
        required: false
        default: ''
      device:
        description: '目标设备'
        required: false
        type: choice
        default: ufi103
        options:
          - ufi103
          - uz801
          - uf02
      build_debug:
        description: '调试模式（详细日志）'
        required: false
        type: boolean
        default: false

env:
  TZ: Asia/Shanghai
  MSM_REPO: https://github.com/hkfuertes/msm8916-openwrt
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # 解析 OpenWrt 版本
  # ==========================================
  resolve-version:
    name: 解析 OpenWrt 版本
    runs-on: ubuntu-22.04
    outputs:
      openwrt_version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: 获取最新 25.12.x 版本
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.openwrt_version }}" ]; then
            VERSION="${{ github.event.inputs.openwrt_version }}"
          else
            VERSION=$(git ls-remote --tags https://git.openwrt.org/openwrt/openwrt.git 'v25.12.*' \
              | grep -oP 'v25\.12\.\d+$' | sort -V | tail -1)
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: 无法解析 OpenWrt 版本"
            exit 1
          fi
          echo "OpenWrt 版本: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # 编译固件
  # ==========================================
  build:
    name: 编译固件 (${{ github.event.inputs.device || 'ufi103' }})
    needs: resolve-version
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache

    steps:
      # ========================================
      # 1. 环境准备
      # ========================================
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 设置设备参数
        id: device-config
        run: |
          DEVICE="${{ github.event.inputs.device || 'ufi103' }}"
          echo "device=$DEVICE" >> $GITHUB_OUTPUT
          # 设备显示名映射
          case "$DEVICE" in
            ufi103) DISPLAY="UFI103_CT" ;;
            uz801)  DISPLAY="UZ801" ;;
            uf02)   DISPLAY="UF02" ;;
            *)      DISPLAY="$DEVICE" ;;
          esac
          echo "display=$DISPLAY" >> $GITHUB_OUTPUT
          # 验证设备配置目录存在
          if [ ! -f "devices/$DEVICE/seed" ]; then
            echo "ERROR: devices/$DEVICE/seed not found"
            exit 1
          fi
          echo "设备: $DISPLAY ($DEVICE)"
          echo "配置: devices/$DEVICE/seed"

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-aarch64-linux-gnu \
            gettext git libncurses5-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev python3-cryptography \
            rsync swig unzip zlib1g-dev quilt \
            patch curl wget xsltproc nano time python3 python3-pip \
            python3-pyelftools libelf-dev libfdt-dev \
            android-sdk-libsparse-utils mkbootimg gcc-arm-none-eabi \
            device-tree-compiler help2man asciidoc intltool bc \
            perl perl-modules e2fsprogs xz-utils zstd zip ccache
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      # ========================================
      # 2. 获取 OpenWrt 官方源码
      # ========================================
      - name: 克隆 OpenWrt 源码
        run: |
          echo "使用 OpenWrt ${{ needs.resolve-version.outputs.openwrt_version }}"
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout ${{ needs.resolve-version.outputs.openwrt_version }}
          echo "OPENWRT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ========================================
      # 3. 注入 MSM8916 设备支持
      # ========================================
      - name: 注入 MSM8916 设备支持
        run: |
          git clone --depth 1 $MSM_REPO msm8916-patches
          cd msm8916-patches
          chmod +x apply_patches.sh
          ./apply_patches.sh ../openwrt
          cd ..
          if [ -d msm8916-patches/msm89xx ]; then
            mv msm8916-patches/msm89xx openwrt/target/linux/msm89xx
          fi
          if [ -d msm8916-patches/packages ]; then
            mv msm8916-patches/packages openwrt/package/msm8916
          fi

          echo "========== MSM8916 设备树 =========="
          ls openwrt/target/linux/msm89xx/ 2>/dev/null || echo "未找到 msm89xx 目录"

      # ========================================
      # 4. 添加第三方 Feeds & 包
      # ========================================
      - name: 添加第三方 Feeds
        run: |
          cd openwrt

          # Nikki (标准 feed)
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki" >> feeds.conf.default

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 添加第三方包 (git clone)
        run: |
          cd openwrt/package

          # Argon 主题
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon

          # FRP 客户端
          git clone --depth 1 https://github.com/kuoruan/luci-app-frpc
          git clone --depth 1 https://github.com/kuoruan/openwrt-frp

      # ========================================
      # 5. 应用设备配置
      # ========================================
      - name: 应用设备配置
        run: |
          DEVICE="${{ steps.device-config.outputs.device }}"
          cd openwrt

          # 复制 seed 配置
          cp "../devices/$DEVICE/seed" .config

          # 展开为完整配置
          make defconfig

          # 复制设备自定义文件
          if [ -d "../devices/$DEVICE/files" ]; then
            cp -r "../devices/$DEVICE/files/"* files/ 2>/dev/null || true
          fi

          echo "========== 配置摘要 =========="
          grep "CONFIG_PACKAGE_" .config | grep "=y" | wc -l
          echo "packages enabled"

      # ========================================
      # 6. 编译
      # ========================================
      - name: 编译固件
        run: |
          cd openwrt

          echo "========== 开始编译 =========="
          if [ "${{ github.event.inputs.build_debug }}" = "true" ]; then
            make -j$(nproc) V=s
          else
            make -j$(nproc) V=s 2>&1 | tee /tmp/build.log || (
              echo "========== 编译失败，最后 200 行日志 =========="
              tail -200 /tmp/build.log
              exit 1
            )
          fi

      # ========================================
      # 7. 收集产物
      # ========================================
      - name: 收集编译产物
        if: success()
        run: |
          DEVICE="${{ steps.device-config.outputs.device }}"
          DISPLAY="${{ steps.device-config.outputs.display }}"
          VERSION="${{ needs.resolve-version.outputs.openwrt_version }}"

          BIN_DIR="openwrt/bin/targets/msm89xx/msm8916"
          if [ ! -d "$BIN_DIR" ]; then
            echo "ERROR: 编译产物目录不存在: $BIN_DIR"
            find openwrt/bin -name "*.bin" -o -name "*.img" 2>/dev/null | head -20
            exit 1
          fi

          PKG_DIR="OpenWrt_${DISPLAY}_${VERSION}"
          mkdir -p "$PKG_DIR"

          # 复制核心镜像
          cp "$BIN_DIR"/gpt_both0.bin "$PKG_DIR/" 2>/dev/null || true
          cp "$BIN_DIR"/*boot.img "$PKG_DIR/" 2>/dev/null || true
          cp "$BIN_DIR"/*rootfs*.img "$PKG_DIR/" 2>/dev/null || true

          # 重命名为标准文件名
          [ -f "$PKG_DIR"/*-boot.img ] && mv "$PKG_DIR"/*-boot.img "$PKG_DIR/boot.img"
          [ -f "$PKG_DIR"/*-rootfs.img ] && mv "$PKG_DIR"/*-rootfs.img "$PKG_DIR/rootfs.img"

          # 复制 manifest
          cp "$BIN_DIR"/*.manifest "$PKG_DIR/" 2>/dev/null || true

          # 下载 Android platform-tools for Windows
          echo "========== 下载 Android platform-tools =========="
          wget -q "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -O /tmp/platform-tools.zip
          unzip -q /tmp/platform-tools.zip -d /tmp/
          cp /tmp/platform-tools/adb.exe "$PKG_DIR/adb.exe"
          cp /tmp/platform-tools/fastboot.exe "$PKG_DIR/fastboot.exe"
          cp /tmp/platform-tools/AdbWinApi.dll "$PKG_DIR/AdbWinApi.dll"
          cp /tmp/platform-tools/AdbWinUsbApi.dll "$PKG_DIR/AdbWinUsbApi.dll"
          rm -rf /tmp/platform-tools /tmp/platform-tools.zip

          # 复制设备原厂基带文件到 firmware/ 子目录
          echo "========== 复制原厂基带文件 =========="
          mkdir -p "$PKG_DIR/firmware"
          cp "$GITHUB_WORKSPACE/devices/$DEVICE/firmware/"* "$PKG_DIR/firmware/" 2>/dev/null || echo "No firmware files to copy"

          # 使用设备目录中的刷机脚本
          if [ -f "devices/$DEVICE/flash.bat" ]; then
            cp "devices/$DEVICE/flash.bat" "$PKG_DIR/flash.bat"
            perl -pi -e 's/\n/\r\n/' "$PKG_DIR/flash.bat"
          fi
          if [ -f "devices/$DEVICE/flash.sh" ]; then
            cp "devices/$DEVICE/flash.sh" "$PKG_DIR/flash.sh"
            chmod +x "$PKG_DIR/flash.sh"
          fi
          if [ -f "devices/$DEVICE/upgrade.bat" ]; then
            cp "devices/$DEVICE/upgrade.bat" "$PKG_DIR/upgrade.bat"
            perl -pi -e 's/\n/\r\n/' "$PKG_DIR/upgrade.bat"
          fi
          if [ -f "devices/$DEVICE/upgrade.sh" ]; then
            cp "devices/$DEVICE/upgrade.sh" "$PKG_DIR/upgrade.sh"
            chmod +x "$PKG_DIR/upgrade.sh"
          fi

          # 生成构建信息
          cat > "$PKG_DIR/build_info.txt" << INFO_EOF
          设备: $DISPLAY
          构建时间: $(date '+%Y-%m-%d %H:%M:%S')
          OpenWrt 版本: $VERSION
          OpenWrt 源码: ${{ env.OPENWRT_COMMIT }}
          MSM8916 补丁: $MSM_REPO
          配置文件: devices/$DEVICE/seed
          INFO_EOF

          echo "========== 最终固件包内容 =========="
          ls -lh "$PKG_DIR/"

      # ========================================
      # 8. 上传产物
      # ========================================
      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_${{ steps.device-config.outputs.display }}_${{ needs.resolve-version.outputs.openwrt_version }}
          path: OpenWrt_${{ steps.device-config.outputs.display }}_${{ needs.resolve-version.outputs.openwrt_version }}/
          retention-days: 7

      - name: 构建摘要
        if: success()
        run: |
          echo "========== 构建完成 =========="
          echo "设备: ${{ steps.device-config.outputs.display }}"
          echo "OpenWrt: ${{ needs.resolve-version.outputs.openwrt_version }}"
          echo "固件已上传到 Artifacts"
          echo "请到 Actions 页面下载"
